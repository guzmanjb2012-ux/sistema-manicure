<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nails App - Recibo Digital</title>
    <!-- Importamos Tailwind CSS desde su CDN oficial -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rosaPrincipal: '#f472b6',
                        rosaOscuro: '#db2777',
                    }
                }
            }
        }
    </script>
</head>
<!-- Mantenemos el fondo cálido aprobado bg-pink-50/40 -->
<body class="bg-pink-50/40 font-sans text-gray-800 antialiased min-h-screen">

    <!-- HEADER IDÉNTICO PARA MANTENER CONSISTENCIA -->
    <header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">💅 San Antonio Nails</h1>
                <p class="text-xs text-gray-500">Recibo Digital de Servicio</p>
            </div>
            <button onclick="window.print()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium px-3 py-1.5 rounded-lg transition">
                🖨️ Imprimir / Guardar
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-8">
        
        <!-- CONTENEDOR ESTILO TICKET DIGITAL -->
        <div class="bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden relative">
            
            <!-- BANNER DE ÉXITO -->
            <div class="bg-emerald-500 text-white text-center py-6 px-4 space-y-1">
                <div class="h-10 w-10 bg-white/20 rounded-full flex items-center justify-center mx-auto text-lg">✓</div>
                <h2 class="text-xl font-bold">¡Cita Confirmada!</h2>
                <p class="text-xs text-emerald-100 font-light">Tu pago ha sido registrado en el sistema</p>
            </div>

            <!-- CUERPO DEL RECIBO -->
            <div id="cuerpo-recibo" class="p-6 space-y-6">
                <!-- Estado de carga inicial -->
                <div class="text-center py-8 text-sm text-gray-400">
                    Buscando los detalles de tu cita...
                </div>
            </div>

            <!-- LÍNEA DE DETALLE ESTILO TICKET DE COMPRA (Bordes dentados visuales) -->
            <div class="border-t-2 border-dashed border-gray-200 my-2"></div>

            <!-- PIE DEL TICKET -->
            <div class="p-6 text-center space-y-2 bg-gray-50">
                <p class="text-xs text-gray-500 font-medium">¡Gracias por preferirnos!</p>
                <p class="text-[10px] text-gray-400">Si necesitas reprogramar, comunícate al WhatsApp de la manicurista al menos 24 horas antes.</p>
                <div class="pt-4">
                    <a href="index.html" class="inline-block bg-pink-500 hover:bg-pink-600 text-white font-bold text-xs py-2.5 px-6 rounded-xl shadow-sm transition">
                        Volver al Inicio
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- ==========================================
         LÓGICA JAVASCRIPT: CONSUMO DETALLADO DEL RECIBO
         ========================================== -->
    <script { data-doc="true" }>
        const API_BASE = "http://127.0.0.1:8000/api";

        /**
         * LECTURA Y RENDERIZADO DEL RECIBO (VERSIÓN BLINDADA)
         */
        async function cargarReciboDigital() {
            const cuerpo = document.getElementById("cuerpo-recibo");
            const parametrosUrl = new URLSearchParams(window.location.search);
            const citaId = parametrosUrl.get("cita_id");

            console.log("DOCUMENTACIÓN: Buscando datos del recibo para la cita ->", citaId);

            if (!citaId) {
                cuerpo.innerHTML = `<p class="text-center text-red-500 text-sm py-4">Error: ID de cita ausente en la URL.</p>`;
                return;
            }

                try {
                const respuesta = await fetch(`${API_BASE}/reservas/${citaId}`);
                
                if (!respuesta.ok) {
                    throw new Error("La cita no existe o el servidor no responde.");
                }

                const apiResponse = await respuesta.json();
                console.log("DATOS REALES RECIBIDOS DEL BACKEND:", apiResponse);

                // 1. Extraemos el contenedor interno 'datos_recibo' que nos mostraste en consola
                const data = apiResponse.datos_recibo;

                if (!data) {
                    throw new Error("Estructura de respuesta inesperada del servidor.");
                }

                // Formateamos la fecha de manera segura
                let fechaFormateada = "Fecha no disponible";
                if (data.fecha_cita) {
                    const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    fechaFormateada = new Date(data.fecha_cita + 'T00:00:00').toLocaleDateString('es-ES', opcionesFecha);
                }

                // 2. Ajustamos los nombres de campos exactos según tu consola
                const codigoCita = data.id ? data.id.substring(0, 8).toUpperCase() : "N/A";
                const nombreCliente = data.cliente_nombre || "Cliente No Registrado";
                const telefonoCliente = data.cliente_telefono || "Sin Teléfono";
                const sectorSanAntonio = data.sector_san_antonio || "No especificado";
                const direccionDetalle = data.direccion_detalle || "Sin detalles de dirección."; // ¡Corregido a _detalle!
                const horaCita = data.hora_cita ? data.hora_cita.substring(0, 5) : "--:--";
                const manicuristaId = data.manicurista_id ? data.manicurista_id.substring(0, 8).toUpperCase() : "N/A";
                
                // 3. Ajustado para leer desde 'catalogo_disenos' en lugar de 'diseno'
                const tituloDiseno = data.catalogo_disenos ? data.catalogo_disenos.titulo : 'Servicio General';
                const precioDiseno = data.catalogo_disenos ? data.catalogo_disenos.precio : '0.00';

                // Inyectamos el contenido de forma segura
                cuerpo.innerHTML = `
                    <!-- BLOQUE 1: CÓDIGO DE RESERVA -->
                    <div class="text-center">
                        <p class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">Código de Cita</p>
                        <p class="text-xs font-mono font-bold text-gray-700 bg-gray-100 px-3 py-1 rounded-md inline-block mt-1">${codigoCita}</p>
                    </div>

                    <!-- BLOQUE 2: DETALLES DE LA CLIENTA -->
                    <div class="space-y-2 border-b border-gray-100 pb-4">
                        <h3 class="text-xs font-bold uppercase text-gray-400 tracking-wider">Datos de la Clienta</h3>
                        <div class="text-sm space-y-1">
                            <p class="font-bold text-gray-900">${nombreCliente}</p>
                            <p class="text-gray-600 text-xs">📱 ${telefonoCliente}</p>
                            <p class="text-gray-600 text-xs">📍 Sector: <span class="font-semibold text-gray-800">${sectorSanAntonio}</span></p>
                            <p class="text-gray-400 text-[11px] italic mt-0.5">${direccionDetalle}</p>
                        </div>
                    </div>

                    <!-- BLOQUE 3: FECHA Y HORA -->
                    <div class="space-y-2 border-b border-gray-100 pb-4">
                        <h3 class="text-xs font-bold uppercase text-gray-400 tracking-wider">Agenda</h3>
                        <div class="text-sm">
                            <p class="text-gray-900 font-medium capitalize">📆 ${fechaFormateada}</p>
                            <p class="text-pink-600 font-bold mt-0.5">⏰ ${horaCita} hrs</p>
                        </div>
                    </div>

                    <!-- BLOQUE 4: DISEÑO Y PRECIO -->
                    <div class="space-y-2">
                        <h3 class="text-xs font-bold uppercase text-gray-400 tracking-wider">Servicio Solicitado</h3>
                        <div class="flex justify-between items-start bg-pink-50/50 p-3 rounded-xl border border-pink-100/50">
                            <div>
                                <p class="text-sm font-bold text-pink-950">${tituloDiseno}</p>
                                <p class="text-[11px] text-pink-700 mt-0.5">Manicurista Asignada ID: ${manicuristaId}</p>
                            </div>
                            <span class="text-base font-black text-pink-900">
                                $${precioDiseno}
                            </span>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error("Error al cargar recibo:", error);
                cuerpo.innerHTML = `
                    <div class="text-center py-6 space-y-2">
                        <p class="text-red-500 text-sm font-semibold">No pudimos procesar tu recibo digital.</p>
                        <p class="text-xs text-gray-400">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Ejecutar inmediatamente cuando el DOM esté listo
        document.addEventListener("DOMContentLoaded", cargarReciboDigital);
    </script>
</body>
</html>
