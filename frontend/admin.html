<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - San Antonio Nails</title>
    <!-- Tailwind CSS para el diseño visual -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 min-h-screen font-sans">

    <!-- ========================================== -->
    <!-- 1. PANTALLA DE CONTROL DE ACCESO (LOGIN) -->
    <!-- ========================================== -->
    <div id="pantallaLogin" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full border border-pink-100">
            <div class="text-center mb-6">
                <span class="text-4xl">💅</span>
                <h1 class="text-2xl font-bold text-gray-800 mt-2">Panel Administrativo</h1>
                <p class="text-gray-500 text-sm mt-1">Ingresa la clave de acceso de la manicurista</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Contraseña</label>
                    <input type="password" id="claveAdmin" placeholder="••••••••" 
                           class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400 text-center tracking-widest text-lg">
                </div>
                <button onclick="verificarAcceso()" 
                        class="w-full bg-pink-500 hover:bg-pink-600 text-white font-semibold py-2.5 rounded-xl transition shadow-md shadow-pink-100">
                    Entrar al Sistema
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 2. PANEL PRINCIPAL                        -->
    <!-- ========================================== -->
    <div id="panelDashboard" class="hidden max-w-6xl mx-auto px-4 py-8">
        
        <!-- Encabezado y Filtros Dinámicos -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8 bg-white p-6 rounded-2xl shadow-sm border border-pink-100">
            <div>
                <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <span>📅</span> Agenda de Citas
                </h2>
                <p class="text-gray-500 text-sm mt-0.5">Control de solicitudes, pagos y notificaciones de clientes</p>
            </div>
            
            <!-- Selector Dinámico de Manicurista y Fecha -->
            <div class="flex flex-col sm:flex-row items-center gap-3 bg-gray-50 p-2 rounded-xl border border-gray-200">
                <!-- Selector de Manicurista -->
                <div class="flex items-center gap-1 sm:border-r sm:border-gray-200 sm:pr-3">
                    <label class="text-xs font-bold uppercase text-gray-500 px-2" for="filtroManicurista">Manicurista:</label>
                    <select id="filtroManicurista" onchange="cargarCitas()" 
                            class="bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-400 cursor-pointer">
                        <option value="64e6dffc-f424-43da-9fad-0ade14ec180b">💅 Andrea Guzman</option>
                        <option value="2">💅 Manicurista Secundaria</option>
                    </select>
                </div>

                <!-- Selector de Fecha -->
                <div class="flex items-center gap-1">
                    <label class="text-xs font-bold uppercase text-gray-500 px-2" for="filtroFecha">Fecha:</label>
                    <input type="date" id="filtroFecha" onchange="cargarCitas()" 
                           class="bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm font-medium text-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-400">
                </div>
            </div>
        </div>

        <!-- Tabla de Datos -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-400 text-xs font-bold uppercase border-b border-gray-100">
                            <th class="p-4">Cliente</th>
                            <th class="p-4">Teléfono</th>
                            <th class="p-4">Hora</th>
                            <th class="p-4">Diseño</th>
                            <th class="p-4 text-center">Estado</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-gray-100 text-gray-700">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-gray-400 text-sm">
                                🔍 Selecciona una fecha arriba para cargar el listado de citas.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 3. LÓGICA DE CONTROL Y COMUNICACIÓN (JS)   -->
    <!-- ========================================== -->
    <script>
        const API_BASE = "http://127.0.0.1:8000/api";

        document.addEventListener("DOMContentLoaded", () => {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById("filtroFecha").value = hoy;
        });

        function verificarAcceso() {
            const claveIngresada = document.getElementById("claveAdmin").value;
            if (claveIngresada === "admin123") {
                document.getElementById("pantallaLogin").classList.add("hidden");
                document.getElementById("panelDashboard").classList.remove("hidden");
                cargarCitas();
            } else {
                alert("❌ Contraseña incorrecta. Inténtalo de nuevo.");
            }
        }

        async function cargarCitas() {
            const fecha = document.getElementById("filtroFecha").value;
            const manicuristaId = document.getElementById("filtroManicurista").value;
            
            if (!fecha || !manicuristaId) return;

            try {
                const respuesta = await fetch(`${API_BASE}/agenda?fecha=${fecha}&manicurista_id=${manicuristaId}`);
                
                if (!respuesta.ok) {
                    const errorBackend = await respuesta.json();
                    alert(`Error ${respuesta.status}:\n${JSON.stringify(errorBackend.detail)}`);
                    return;
                }
                
                const respuestaRaw = await respuesta.json();
                const citas = respuestaRaw.agenda || [];
                
                const tabla = document.getElementById("cuerpoTabla");
                tabla.innerHTML = ""; 

                if (citas.length === 0) {
                    tabla.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-400 text-sm">No hay citas registradas para esta fecha.</td></tr>`;
                    return;
                }

                citas.forEach(cita => {
                    const horaFormateada = cita.hora_cita ? cita.hora_cita.substring(0, 5) : '--:--';
                    const disenoTitulo = cita.diseno_titulo || 'No especificado';
                    const estadoCita = cita.estado ? cita.estado.toLowerCase().trim() : '';

                    let claseColorEstado = "bg-amber-100 text-amber-800"; 
                    if (estadoCita.includes("confirm")) claseColorEstado = "bg-emerald-100 text-emerald-800";
                    if (estadoCita.includes("cancel")) claseColorEstado = "bg-red-100 text-red-800";

                    let botonConfirmar = "";
                    if (estadoCita.includes("pendiente")) {
                        botonConfirmar = `<button onclick="actualizarEstadoCita('${cita.id}', 'confirmada')" class="bg-emerald-500 hover:bg-emerald-600 text-white text-[11px] px-2.5 py-1 rounded-lg transition font-medium shadow-sm">✓ Confirmar</button>`;
                    }

                    let botonCancelar = "";
                    if (!estadoCita.includes("cancel")) {
                        botonCancelar = `<button onclick="actualizarEstadoCita('${cita.id}', 'cancelada')" class="bg-white hover:bg-red-50 text-red-500 border border-red-200 text-[11px] px-2.5 py-1 rounded-lg transition font-medium">✕ Cancelar</button>`;
                    }

                    const fila = document.createElement("tr");
                    fila.className = "border-b hover:bg-gray-50 transition-colors";
                    fila.innerHTML = `
                        <td class="p-4 font-semibold text-gray-900">${cita.cliente_nombre}</td>
                        <td class="p-4 text-gray-600 text-sm">${cita.cliente_telefono}</td>
                        <td class="p-4 text-gray-700 text-sm font-bold">${horaFormateada} hrs</td>
                        <td class="p-4 text-gray-600 text-sm">${disenoTitulo}</td>
                        <td class="p-4 text-center">
                            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${claseColorEstado}">
                                ${cita.estado}
                            </span>
                        </td>
                        <td class="p-4 text-center space-y-1.5">
                            <div class="flex items-center justify-center gap-1.5">
                                ${botonConfirmar}
                                ${botonCancelar}
                            </div>
                            <button onclick="dispararWhatsApp('${cita.cliente_telefono}', '${cita.cliente_nombre}', '${cita.fecha_cita}', '${horaFormateada}', '${disenoTitulo}', '${cita.estado}')" 
                                    class="w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-[11px] py-1 px-2 rounded-lg font-bold border border-emerald-200 transition flex items-center justify-center gap-1">
                                💬 Notificar WhatsApp
                            </button>
                        </td>
                    `;
                    tabla.appendChild(fila);
                });

            } catch (error) {
                console.error("Error cargando citas:", error);
                alert(`❌ Error detectado en el navegador:\n${error.message}`);
            }
        }

        async function actualizarEstadoCita(citaId, nuevoEstado) {
            if (!confirm(`¿Estás seguro de que deseas marcar esta cita como "${nuevoEstado}"?`)) return;

            try {
                const respuesta = await fetch(`${API_BASE}/reservas/${citaId}/estado`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ estado: nuevoEstado })
                });

                if (respuesta.ok) {
                    alert(`¡Perfecto! La cita fue cambiada a: ${nuevoEstado}.`);
                    cargarCitas(); 
                } else {
                    const errorBackend = await respuesta.json();
                    alert(`Error en backend: ${errorBackend.detail || 'Operación rechazada.'}`);
                }
            } catch (error) {
                console.error("Error en PATCH:", error);
                alert("Error de conexión al intentar actualizar el estado.");
            }
        }

        // FUNCIÓN DE WHATSAPP REESTRUCTURADA Y BLINDADA
        function dispararWhatsApp(telefono, nombre, fecha, hora, diseno, estado) {
            let numeroLimpio = telefono.replace(/\s+/g, '').replace(/[^0-9]/g, '');
            if (numeroLimpio.startsWith('0')) {
                numeroLimpio = '58' + numeroLimpio.substring(1);
            }
            
            const estadoLimpio = estado ? estado.toLowerCase().trim() : '';
            let mensaje = "";
            
            // Detección inteligente usando .includes() para evitar fallos por mayúsculas o guiones
            if (estadoLimpio.includes("confirm")) {
                mensaje = `¡Hola *${nombre}*! ✨ Te escribo de *San Antonio Nails*. Te confirmo que tu pago fue verificado y tu cita está *CONFIRMADA* para el día *${fecha}* a las *${hora} hrs*. Diseño seleccionado: ${diseno}. ¡Te esperamos! 💅`;
            } else if (estadoLimpio.includes("pendiente")) {
                mensaje = `¡Hola *${nombre}*! ✨ Te escribo de *San Antonio Nails*. Hemos recibido tu solicitud de cita para el día *${fecha}* a las *${hora} hrs* (Diseño: ${diseno}). Estamos procesando la verificación de tu pago para confirmarte a la brevedad. ¡Gracias! 💕`;
            } else {
                mensaje = `Hola *${nombre}*, te escribo de *San Antonio Nails*. Te notificamos que tu solicitud de cita para el día *${fecha}* ha sido cancelada en el sistema. Quedamos a tu orden ante cualquier duda.`;
            }

            // Forzamos el subdominio directo de la aplicación web de escritorio
            const urlWhatsApp = `https://web.whatsapp.com/send?phone=${numeroLimpio}&text=${encodeURIComponent(mensaje)}`;
            window.open(urlWhatsApp, '_blank');
        }
    </script>
</body>
</html>
